<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Efrei Computer Science - Contact</title>
        <meta charset="utf-8">

        <link rel="stylesheet" type="text/css" href="../css/style.css">
        <script type="text/javascript" src="../js/js.js" defer></script>
    </head>
    <body data-page="contact">
        <div class="page-shell">
            <header class="site-header">
                <div class="header-card">
                    <a class="brand-mark" href="./home.html">
                        <img src="../img/Logo Efrei bleu.png" alt="Efrei logo">
                    </a>
                    <nav class="main-nav" aria-label="Primary navigation">
                        <a href="./home.html">Home</a>
                        <a href="./courses.html">Courses</a>

                    </nav>
                </div>
            </header>

            <main class="site-main">
                <section class="page-title">
                    <h1>Contact</h1>
                </section>

                <section class="contact-wrap">
                    <form class="contact-card">
                        <div class="contact-intro">
                            <h2>Write us !</h2>
                        </div>
                        <div class="contact-fields">
                            <input type="text" name="name" placeholder="Name" aria-label="Name">
                            <input type="email" name="email" placeholder="Email" aria-label="Email">
                            <textarea name="message" placeholder="Content" aria-label="Content"></textarea>
                            <label class="contact-consent">
                                <input type="checkbox" name="newsletter">
                                <span>I would like to receive the newsletter.</span>
                            </label>
                        </div>
                        <button class="contact-submit" type="submit">Submit</button>
                    </form>
                </section>
            </main>

            <footer class="site-footer">
                <div class="footer-links">
                    <div class="footer-column">
                        <h3>Company</h3>
                        <a href="./about.html">About Us</a>
                        <a href="./contact.html">Contact</a>
                    </div>
                    <div class="footer-column">
                        <h3>Courses</h3>
                        <a href="./courses.html">Engineer</a>

                    </div>
                    <div class="footer-column">

                        <a href="https://twitter.com/">Twitter</a>
                        <a href="https://www.instagram.com/">Instagram</a>
                        <a href="https://github.com/DimitriCh0/Web-Development-Project-CHAU-MORENO-MAZA">GitHub</a>
                    </div>
                </div>
                <div class="footer-bottom">
                    <img src="../img/Logo Efrei bleu.png" alt="Efrei logo">
                    <p>© 2026 Efrei Computer Science Department. All rights reserved.</p>
                </div>
            </footer>
        </div>
    </body>
</html>
